version: '3.8'

services:
  # MongoDB - Main Database
  mongodb:
    image: mongo:7.0
    container_name: cyberguard-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: cyberguard2024
      MONGO_INITDB_DATABASE: cyberguard
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
    networks:
      - cyberguard-network

  # PostgreSQL - Compliance & Structured Data
  postgres:
    image: postgres:16
    container_name: cyberguard-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cyberguard
      POSTGRES_PASSWORD: cyberguard2024
      POSTGRES_DB: cyberguard_compliance
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cyberguard-network

  # Redis - Caching & Real-time
  redis:
    image: redis:7-alpine
    container_name: cyberguard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass cyberguard2024
    volumes:
      - redis_data:/data
    networks:
      - cyberguard-network

  # InfluxDB - Time Series Data
  influxdb:
    image: influxdb:2.7
    container_name: cyberguard-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: cyberguard2024
      DOCKER_INFLUXDB_INIT_ORG: cyberguard
      DOCKER_INFLUXDB_INIT_BUCKET: network_traffic
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: cyberguard-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - cyberguard-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: cyberguard-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:cyberguard2024@mongodb:27017/cyberguard?authSource=admin
      POSTGRES_URI: postgresql://cyberguard:cyberguard2024@postgres:5432/cyberguard_compliance
      REDIS_URL: redis://:cyberguard2024@redis:6379
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: cyberguard-super-secret-token
      INFLUXDB_ORG: cyberguard
      INFLUXDB_BUCKET: network_traffic
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRE: 24h
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      - mongodb
      - postgres
      - redis
      - influxdb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - cyberguard-network

  # ML Service (Python FastAPI)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: ../infrastructure/docker/Dockerfile.ml
    container_name: cyberguard-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      MONGODB_URI: mongodb://admin:cyberguard2024@mongodb:27017/cyberguard?authSource=admin
      REDIS_URL: redis://:cyberguard2024@redis:6379
      MODEL_PATH: /app/models
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models
    networks:
      - cyberguard-network

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    container_name: cyberguard-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_WS_URL: ws://localhost:5000
      REACT_APP_ML_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - cyberguard-network

  # Nginx Reverse Proxy (Production-like setup)
  nginx:
    image: nginx:alpine
    container_name: cyberguard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - cyberguard-network

networks:
  cyberguard-network:
    driver: bridge

volumes:
  mongodb_data:
  postgres_data:
  redis_data:
  influxdb_data:
  ml_models:
